name: Build and Deploy Skin

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Deploy to dist branch (for github-branch installs)
      - name: Deploy to dist branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          force_orphan: true

      # Create release ZIP (for github-release installs)
      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist
          zip -r ../extracto-patronum-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: extracto-patronum-${{ github.ref_name }}.zip
          generate_release_notes: true
